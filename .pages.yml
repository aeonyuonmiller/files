media:
  input: images
  output: /images

# ─── Reusable components ────────────────────────────────────────
components:

  hero:
    label: Hero / Slider
    type: object
    fields:
      - name: heroTitle
        label: Title
        type: string
        required: true
      - name: heroAlign
        label: Title Alignment
        type: select
        options:
          values: [center, left]
      - name: heroParagraph
        label: Paragraph
        type: text
      - name: heroParagraphAlign
        label: Paragraph Alignment
        type: select
        options:
          values: [middle, right]

  reel_image:
    label: Reel Image
    type: object
    fields:
      - name: src
        label: Image
        type: image
        required: true
      - name: caption
        label: Caption (optional)
        type: string
      - name: span
        label: Column Span
        type: select
        options:
          values: ["1", "2", "3"]

  reel:
    label: Image Reel
    type: object
    fields:
      - name: images
        label: Images
        type: object
        component: reel_image
        list: true

  caption:
    label: Caption Block
    type: object
    fields:
      - name: tag
        label: Tag / Label
        type: string
      - name: heading
        label: Heading
        type: string
        required: true
      - name: body
        label: Body Text
        type: text
      - name: buttonLabel
        label: Button Label
        type: string
      - name: buttonHref
        label: Button Link
        type: string

  project_card:
    label: Project Card
    type: object
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: image
        label: Image
        type: image
      - name: text
        label: Description
        type: text
      - name: link
        label: Link
        type: string
      - name: buttonLabel
        label: Button Label
        type: string

  cards:
    label: Project Cards
    type: object
    fields:
      - name: cards
        label: Cards
        type: object
        component: project_card
        list: true

# ─── Pages ──────────────────────────────────────────────────────
content:

  - name: index
    label: Home
    path: index.md
    type: file
    fields:
      - name: title
        label: Page Title
        type: string
      - name: slug
        label: Slug
        type: string
      - name: namespace
        label: Barba Namespace
        type: string
      - name: hero
        label: Hero
        component: hero
      - name: sections
        label: Sections
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{fields.type} ({index})"
        fields:
          - name: type
            label: Section Type
            type: select
            options:
              values: [reel, caption, cards]
          - name: reel
            label: Reel
            component: reel
          - name: caption
