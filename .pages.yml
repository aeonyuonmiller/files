media:
  input: images
  output: /images

content:

  # ── Navigation ────────────────────────────────────────────
  - name: navigation
    label: Navigation
    path: content/data
    filename: nav.json
    type: file
    fields:
      - name: items
        label: Nav items
        type: list
        fields:
          - name: label
            label: Label
            type: string
          - name: href
            label: URL / href
            type: string
          - name: external
            label: External link?
            type: boolean

  # ── Pages collection ──────────────────────────────────────
  - name: pages
    label: Pages
    path: content/pages
    type: collection
    filename: "{fields.slug}"
    extension: mdx
    view:
      fields: [title, slug, navLabel]
    fields:
      - name: title
        label: Page title (browser tab)
        type: string
        required: true

      - name: slug
        label: Slug (filename, e.g. "work" → work.html)
        type: string
        required: true
        pattern: "^[a-z0-9-]+$"

      - name: navLabel
        label: Nav label
        type: string

      - name: namespace
        label: Barba namespace
        type: string
        default: page

      - name: heroTitle
        label: Hero title
        type: string

      - name: heroAlign
        label: Hero title alignment
        type: select
        options:
          - center
          - left
        default: center

      - name: heroParagraph
        label: Hero paragraph
        type: text

      - name: heroParagraphAlign
        label: Hero paragraph position
        type: select
        options:
          - middle
          - right
        default: middle

      - name: sections
        label: Sections
        type: list
        fields:
          - name: type
            label: Section type
            type: select
            options:
              - reel
              - caption
              - cards

          # --- reel ---
          - name: images
            label: Images (reel)
            type: list
            fields:
              - name: src
                label: Image
                type: image
              - name: span
                label: Grid span (1–4)
                type: number
                default: 1

          # --- caption ---
          - name: tag
            label: Tag (small label above h2)
            type: string
          - name: heading
            label: Heading
            type: string
          - name: body
            label: Body text
            type: text
          - name: buttonLabel
            label: Button label
            type: string
          - name: buttonHref
            label: Button URL
            type: string

          # --- cards ---
          - name: cards
            label: Cards
            type: list
            fields:
              - name: title
                label: Title
                type: string
              - name: image
                label: Image
                type: image
              - name: text
                label: Text
                type: text
              - name: link
                label: Link
                type: string
              - name: buttonLabel
                label: Button label
                type: string

      - name: body
        label: Extra body (MDX)
        type: rich-text
